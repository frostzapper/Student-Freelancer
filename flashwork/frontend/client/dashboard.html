<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard - FlashWork</title>
    <link rel="stylesheet" href="../css/global.css?v=2">
    <link rel="stylesheet" href="../css/animations.css?v=2">
    <link rel="stylesheet" href="../css/transitions.css?v=2">
    <link rel="stylesheet" href="../css/loading-states.css?v=2">
    <link rel="stylesheet" href="../css/layout.css?v=2">
    <link rel="stylesheet" href="../css/components.css?v=2">
    <link rel="stylesheet" href="../css/client.css?v=2">
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div class="dashboard-container">
            <!-- Header -->
            <div class="dashboard-header">
                <div>
                    <h1>Client Dashboard</h1>
                    <p class="dashboard-subtitle">Manage your posted jobs and wallet</p>
                </div>
                <button class="btn btn-primary btn-large" data-ripple onclick="window.location.href='/client/post-job.html'">
                    Post a Job
                </button>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <!-- Wallet Balance Card -->
                <div class="stat-card wallet-card" data-reveal>
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.433 7.418c.155-.103.346-.196.567-.267v1.698a2.305 2.305 0 01-.567-.267C8.07 8.34 8 8.114 8 8c0-.114.07-.34.433-.582zM11 12.849v-1.698c.22.071.412.164.567.267.364.243.433.468.433.582 0 .114-.07.34-.433.582a2.305 2.305 0 01-.567.267z"/>
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h3>Wallet Balance</h3>
                    <div class="stat-value" data-counter data-target="0" data-format="currency" id="wallet-balance">₹0</div>
                    <button class="btn btn-secondary btn-small" data-ripple onclick="window.location.href='/client/wallet.html'">
                        Top Up
                    </button>
                </div>
                
                <!-- Total Jobs -->
                <div class="stat-card" data-reveal>
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h3>Total Jobs</h3>
                    <div class="stat-value" data-counter data-target="0" data-format="number" id="total-jobs">0</div>
                </div>
                
                <!-- Active Jobs -->
                <div class="stat-card" data-reveal>
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h3>Active Jobs</h3>
                    <div class="stat-value" data-counter data-target="0" data-format="number" id="active-jobs">0</div>
                </div>
                
                <!-- Completed Jobs -->
                <div class="stat-card" data-reveal>
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h3>Completed</h3>
                    <div class="stat-value" data-counter data-target="0" data-format="number" id="completed-jobs">0</div>
                </div>
                
                <!-- Total Spent -->
                <div class="stat-card" data-reveal>
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.433 7.418c.155-.103.346-.196.567-.267v1.698a2.305 2.305 0 01-.567-.267C8.07 8.34 8 8.114 8 8c0-.114.07-.34.433-.582zM11 12.849v-1.698c.22.071.412.164.567.267.364.243.433.468.433.582 0 .114-.07.34-.433.582a2.305 2.305 0 01-.567.267z"/>
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h3>Total Spent</h3>
                    <div class="stat-value" data-counter data-target="0" data-format="currency" id="total-spent">₹0</div>
                </div>
            </div>
            
            <!-- Trust Fund Info Card -->
            <div class="trust-fund-card">
                <div class="trust-fund-icon">🛡️</div>
                <div class="trust-fund-info">
                    <div class="trust-fund-label">
                        Platform Trust Fund
                        <span class="info-tooltip" title="1% of every approved job goes here as skill insurance">ℹ️</span>
                    </div>
                    <div class="trust-fund-amount" id="trust-fund-balance">₹0</div>
                </div>
            </div>
            
            <!-- Jobs Section -->
            <div class="jobs-section">
                <div class="section-header">
                    <h2>My Posted Jobs</h2>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-status="all">All</button>
                        <button class="filter-tab" data-status="open">Open</button>
                        <button class="filter-tab" data-status="assigned">Assigned</button>
                        <button class="filter-tab" data-status="submitted">Submitted</button>
                        <button class="filter-tab" data-status="completed">Completed</button>
                    </div>
                </div>
                
                <!-- Loading State -->
                <div id="loading-jobs" class="loading-state">
                    <p>Loading your jobs...</p>
                </div>
                
                <!-- Jobs Grid -->
                <div id="jobs-grid" class="client-jobs-grid" style="display: none;"></div>
                
                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">📭</div>
                    <h3 class="empty-title">No jobs posted yet</h3>
                    <p class="empty-message">Start by posting your first job</p>
                    <button class="btn btn-primary" onclick="window.location.href='/client/post-job.html'">
                        Post a Job
                    </button>
                </div>
            </div>
        </div>
    </main>
    
    <div id="toast" class="toast"></div>
    <div id="footer-container"></div>
    
    <script type="module" src="../js/client/dashboard.js"></script>
    <script type="module" src="../js/components/navbar.js"></script>
    <script type="module" src="../js/init-animations.js"></script>
</body>
</html>
