<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - FlashWork</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/worker.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <main class="wallet-page">
        <h1>My Wallet</h1>
        
        <div class="wallet-balance">
            <h2>Current Balance</h2>
            <p class="balance-amount" id="balance">₹0</p>
        </div>
        
        <div class="wallet-actions">
            <button class="btn btn-primary" id="withdraw-btn">Withdraw</button>
        </div>
        
        <div class="transactions">
            <h2>Recent Transactions</h2>
            <div id="transactions-list"></div>
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script type="module" src="../js/worker/wallet.js"></script>
    <script type="module" src="../js/components/navbar.js"></script>
</body>
</html>
