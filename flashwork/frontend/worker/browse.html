<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - FlashWork</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/worker-light.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <main>
        <div class="browse-layout">
            <!-- Filters Sidebar -->
            <aside class="filters-sidebar">
                <div class="filters-header">
                    <h3>Filters</h3>
                    <button class="btn-icon" id="reset-filters" title="Reset all filters">↻</button>
                </div>
                
                <!-- Work Mode Filter -->
                <div class="filter-section">
                    <h4>Work Mode</h4>
                    <div class="filter-option">
                        <input type="radio" id="mode-all" name="work-mode" value="" checked>
                        <label for="mode-all">All</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="mode-solo" name="work-mode" value="solo">
                        <label for="mode-solo">👤 Solo</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="mode-group" name="work-mode" value="group">
                        <label for="mode-group">👥 Group</label>
                    </div>
                </div>
                
                <!-- Work Location Filter -->
                <div class="filter-section">
                    <h4>Work Location</h4>
                    <div class="filter-option">
                        <input type="radio" id="location-all" name="work-location" value="" checked>
                        <label for="location-all">All</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="location-online" name="work-location" value="online">
                        <label for="location-online">🌐 Online</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="location-offline" name="work-location" value="offline">
                        <label for="location-offline">📍 Offline</label>
                    </div>
                </div>
                
                <!-- Checkboxes -->
                <div class="filter-section">
                    <h4>Job Type</h4>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-urgent">
                        <label for="filter-urgent">⚡ Urgent Only</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-ai">
                        <label for="filter-ai">🤖 AI Allowed</label>
                    </div>
                    <div class="filter-option" id="auction-filter-option" style="display: none;">
                        <input type="checkbox" id="filter-auction">
                        <label for="filter-auction">🎯 Auction Mode</label>
                    </div>
                </div>
                
                <!-- Price Range Filter -->
                <div class="filter-section">
                    <h4>Price Range (₹)</h4>
                    <div class="price-inputs">
                        <input type="number" id="min-price" placeholder="Min" min="0" value="0">
                    </div>
                    <input type="range" id="price-slider" class="price-slider" min="0" max="50000" step="500" value="0">
                    <div class="price-value">Min: ₹<span id="price-display">0</span></div>
                </div>
                
                <!-- Apply Filters Button -->
                <button class="btn btn-primary" id="apply-filters" style="width: 100%; margin-top: 1rem;">
                    Apply Filters
                </button>
            </aside>
            
            <!-- Main Content -->
            <div class="browse-content">
                <div class="browse-header">
                    <div class="jobs-count" id="jobs-count">Loading...</div>
                    <div class="browse-actions">
                        <div class="search-bar">
                            <span>🔍</span>
                            <input type="text" placeholder="Search jobs..." id="search-input">
                            <button id="search-btn">Search</button>
                        </div>
                    </div>
                </div>
                
                <!-- Loading State -->
                <div id="loading-state" class="loading-state">
                    <p>Loading jobs...</p>
                </div>
                
                <!-- Jobs Grid -->
                <div id="jobs-grid" class="jobs-grid" style="display: none;"></div>
                
                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">📭</div>
                    <h3 class="empty-title">No jobs available</h3>
                    <p class="empty-message">Try adjusting your filters</p>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Bid Modal -->
    <div id="bid-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Place Your Bid</h3>
                <button class="modal-close" id="close-modal">×</button>
            </div>
            <div class="modal-body">
                <p id="bid-job-title"></p>
                <div class="form-group">
                    <label for="bid-pitch">Your Pitch</label>
                    <textarea id="bid-pitch" rows="4" placeholder="Explain why you're the best fit for this job..."></textarea>
                </div>
                <div class="form-group">
                    <label for="bid-confidence">Confidence Level (1-10)</label>
                    <input type="number" id="bid-confidence" min="1" max="10" value="8">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-bid">Cancel</button>
                <button class="btn btn-primary" id="submit-bid">Submit Bid</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    <div id="footer-container"></div>
    
    <script type="module" src="../js/worker/browse.js?v=2"></script>
    <script type="module" src="../js/components/navbar.js"></script>
</body>
</html>
